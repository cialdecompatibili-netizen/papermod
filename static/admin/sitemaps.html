<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitemap</title>
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .wrap { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.09); padding: 40px 36px; width: 100%; max-width: 480px; }
  h1 { font-size: 1.25rem; color: #111; margin: 0 0 6px; }
  p  { font-size: .88rem; color: #666; margin: 0 0 28px; }
  a.item { display: flex; align-items: center; gap: 14px; padding: 15px 16px; border: 1.5px solid #e5e7eb; border-radius: 10px; text-decoration: none; color: #111; margin-bottom: 12px; transition: .15s; }
  a.item:hover { border-color: #6366f1; background: #f5f3ff; }
  .ico { font-size: 1.6rem; flex-shrink: 0; }
  .txt strong { display: block; font-size: .95rem; }
  .txt small  { color: #888; font-size: .76rem; }
  .badge { margin-left: auto; background: #6366f1; color: #fff; font-size: .7rem; border-radius: 20px; padding: 3px 10px; white-space: nowrap; }
  .back { display: inline-block; margin-top: 24px; font-size: .84rem; color: #6366f1; text-decoration: none; }
  .back:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🗺️ Sitemap del sito</h1>
  <p>Clicca per aprire una sitemap o inviala a Google Search Console.</p>

  <a class="item" href="https://papermod-1rp.pages.dev/sitemap.xml" target="_blank">
    <span class="ico">📋</span>
    <div class="txt"><strong>Sitemap Index</strong><small>Tutte le lingue — da inviare a Google</small></div>
    <span class="badge">⭐ Principale</span>
  </a>

  <a class="item" href="https://papermod-1rp.pages.dev/it/sitemap.xml" target="_blank">
    <span class="ico">🇮🇹</span>
    <div class="txt"><strong>Sitemap Italiano</strong><small>/it/sitemap.xml</small></div>
  </a>

  <a class="item" href="https://papermod-1rp.pages.dev/en/sitemap.xml" target="_blank">
    <span class="ico">🇬🇧</span>
    <div class="txt"><strong>Sitemap Inglese</strong><small>/en/sitemap.xml</small></div>
  </a>

  <a class="back" href="/admin/">← Torna all'admin</a>
</div>
</body>
</html>
