backend:
  name: github
  repo: cialdecompatibili-netizen/papermod
  branch: main
  base_url: https://papermod-1rp.pages.dev
  auth_endpoint: api/auth
media_folder: static/images/blog
public_folder: /images/blog
collections:
  - name: blog
    label: Blog
    folder: content/blog
    create: true
    delete: true
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Date, name: date, widget: datetime}
      - {label: Description, name: description, widget: string, required: false}
      - {label: Author, name: author, widget: string, required: false, default: "Il tuo nome"}
      - {label: Categories, name: categories, widget: list, required: false, default: ["Test"]}
      - {label: Tags, name: tags, widget: list, required: false, default: ["test"]}
      - {label: Featured Image, name: featured_image, widget: image, required: false, default: "/images/blog/blog-4.jpg"}
      - {label: Body, name: body, widget: markdown}
  - name: pages
    label: Pagine
    folder: content
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Layout, name: layout, widget: select, options: ["simple", "feature", "pricing", "company", "career"], default: "simple", required: false}
      - {label: Description, name: description, widget: string, required: false}
      - {label: Body, name: body, widget: markdown}
