# --- CONFIGURAZIONE BACKEND ---
# Usiamo il backend 'github' ma con 'local_backend: true' per lo sviluppo locale
backend:
  name: github
  repo: cialdecompatibili-netizen/papermod
  branch: main
  base_url: https://papermod-1rp.pages.dev
  auth_endpoint: api/auth

# local_backend: true

# --- CONFIGURAZIONE MULTILINGUA CMS ---
# 'structure: multiple_files' significa che ogni lingua ha il suo file (post.md, post.en.md)
i18n:
  structure: multiple_files
  locales: [it, en]
  default_locale: it

# --- GESTIONE MEDIA ---
media_folder: static/images/uploads
public_folder: /images/uploads

# --- COLLEZIONI (Menu laterale Admin) ---
collections:
  # Gestione Logo, Titolo e Social
  - name: settings
    label: Impostazioni Sito
    files:
      - label: "Impostazioni Lettura"
        name: "reading"
        file: "data/settings.yml"
        i18n: true
        fields:
          - label: "Pagina Home"
            name: "home_page"
            widget: "select"
            options:
              - { label: "Home Page (Predefinita)", value: "/" }
              - { label: "Chi Siamo", value: "/company" }
              - { label: "Prezzi", value: "/pricing" }
              - { label: "Lavora con noi", value: "/careers" }
              - { label: "Privacy Policy", value: "/privacy" }
              - { label: "Licenza", value: "/license" }
            default: "/"
            required: false
            hint: "Seleziona la pagina da usare come Home Page"
          - label: "Pagina Blog"
            name: "blog_page"
            widget: "select"
            options:
              - { label: "Blog (Predefinito)", value: "/blog" }
              - { label: "Chi Siamo", value: "/company" }
              - { label: "Prezzi", value: "/pricing" }
              - { label: "Lavora con noi", value: "/careers" }
            default: "/blog"
            required: false
            hint: "Seleziona la pagina che mostrerà l'elenco degli articoli"

      - label: Impostazioni Generali
        name: general
        file: content/_index.md
        i18n: true
        fields:
          - {label: Titolo Sito, name: title, widget: string}
          - {label: Descrizione SEO, name: description, widget: string}
          - {label: Logo, name: logo, widget: image, required: false}
          - label: "🗺️ Sitemap del sito"
            name: "sitemap_url"
            widget: "string"
            default: "https://papermod-1rp.pages.dev/admin/sitemaps.html"
            required: false
            hint: "Copia questo link nel browser per vedere e verificare le sitemap IT, EN e Index"

      - label: Impostazioni Social
        name: social_settings
        file: content/_index.md
        i18n: true
        fields:
          - label: Social Media
            name: social
            widget: object
            fields:
              - {label: LinkedIn, name: linkedin, widget: string, required: false}
              - {label: Twitter/X, name: twitter, widget: string, required: false}
              - {label: GitHub, name: github, widget: string, required: false}
              - {label: Instagram, name: instagram, widget: string, required: false}

  # Gestione Articoli del Blog
  - name: blog
    label: Blog
    folder: content/blog
    i18n: true
    create: true
    delete: true
    fields:
      - {label: Titolo, name: title, widget: string, i18n: true}
      - {label: "Bozza (Draft)", name: draft, widget: boolean, default: true, i18n: duplicate, hint: "Se attivo, il post NON apparirà sul sito pubblico"}
      - {label: Data, name: date, widget: datetime, i18n: duplicate}
      - {label: Descrizione, name: description, widget: string, required: false, i18n: true, hint: "Breve riassunto per la lista dei post e fallback SEO"}
      - {label: Autore, name: author, widget: string, required: false, i18n: true}
      - label: SEO & Social
        name: seo
        widget: object
        collapsed: true
        i18n: true
        fields:
          - {label: Titolo SEO, name: seo_title, widget: string, required: false, hint: "Se vuoto, usa il titolo del post"}
          - {label: Descrizione SEO, name: seo_description, widget: text, required: false, hint: "Se vuoto, usa la descrizione sopra"}
          - {label: Immagine Social (OG), name: og_image, widget: image, required: false, hint: "Immagine specifica per la condivisione su Facebook/LinkedIn"}
      - label: Categorie
        name: categories
        widget: relation
        collection: categories
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        multiple: true
        required: true
        default: ["Senza Categoria"]
        i18n: true
      - {label: Tags, name: tags, widget: list, required: false, i18n: true}
      - {label: Immagine Copertina, name: featured_image, widget: image, required: false, default: "/images/blog/blog-1.jpg", i18n: duplicate}
      - {label: Contenuto, name: body, widget: markdown, i18n: true}
  
  # Gestione Categorie (Titoli e Descrizioni personalizzate)
  - name: categories
    label: Gestore Categorie
    folder: content/categories
    i18n: true
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome Categoria", name: title, widget: string, i18n: true}
      - {label: "Bozza (Draft)", name: draft, widget: boolean, default: false, i18n: duplicate, hint: "Se attivo, la categoria NON apparirà sul sito pubblico"}
      - {label: "Descrizione Breve", name: description, widget: string, required: false, i18n: true, hint: "Breve descrizione usata nei meta tag SEO e sotto il titolo categoria"}
      - {label: "Descrizione Completa", name: body, widget: markdown, required: false, i18n: true, hint: "Testo lungo che appare nella pagina della categoria (come WordPress)"}
      - {label: "Immagine Categoria", name: image, widget: image, required: false, i18n: duplicate, hint: "Immagine di copertina per la categoria"}
      - label: "SEO & Social"
        name: seo
        widget: object
        collapsed: true
        i18n: true
        required: false
        fields:
          - {label: "Titolo SEO", name: seo_title, widget: string, required: false, hint: "Se vuoto, usa il nome della categoria"}
          - {label: "Descrizione SEO", name: seo_description, widget: text, required: false, hint: "Se vuoto, usa la descrizione breve sopra"}
          - {label: "Immagine Social (OG)", name: og_image, widget: image, required: false, hint: "Immagine per la condivisione su Facebook/LinkedIn"}
  
  # Gestione Pagine (WordPress Style)
  - name: pages
    label: Pagine
    folder: content
    i18n: true
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - {label: Titolo, name: title, widget: string}
      - {label: "Bozza (Draft)", name: draft, widget: boolean, default: true, i18n: duplicate}
      - {label: Layout, name: layout, widget: select, options: ["simple", "feature", "pricing", "company", "career"], default: "simple", required: false}
      - {label: Descrizione, name: description, widget: string, required: false}
      - label: SEO & Social
        name: seo
        widget: object
        collapsed: true
        fields:
          - {label: Titolo SEO, name: seo_title, widget: string, required: false}
          - {label: Descrizione SEO, name: seo_description, widget: text, required: false}
          - {label: Immagine Social (OG), name: og_image, widget: image, required: false}
      - {label: Contenuto, name: body, widget: markdown}

  # Home Page Speciale
  - name: home_page_special
    label: "Home Page (Predefinita)"
    files:
      - label: "Home Page (Contenuti Speciali)"
        name: "home"
        file: "content/_index.md"
        i18n: true
        fields:
          - {label: Titolo Pagina, name: title, widget: string}
          - {label: "Bozza (Draft)", name: draft, widget: boolean, default: true, i18n: duplicate}
          - {label: Descrizione SEO, name: description, widget: string, hint: "Fallback SEO se il blocco sotto è vuoto"}
          - label: SEO & Social Avanzato
            name: seo
            widget: object
            collapsed: true
            fields:
              - {label: Titolo SEO, name: seo_title, widget: string, required: false}
              - {label: Descrizione SEO, name: seo_description, widget: text, required: false}
              - {label: Immagine Social (OG), name: og_image, widget: image, required: false}
          - label: Loghi Clienti
            name: client_logos
            widget: list
            collapsed: true
            required: false
            fields:
              - {label: Nome, name: name, widget: string}
              - {label: Logo, name: logo, widget: image}
          - label: Testimonianze
            name: testimonials
            widget: list
            collapsed: true
            required: false
            fields:
              - {label: Nome, name: name, widget: string}
              - {label: Ruolo, name: title, widget: string}
              - {label: Avatar, name: avatar, widget: image}
              - {label: Citazione, name: quote, widget: text}
          - {label: Contenuto Pagina (Markdown/Shortcodes), name: body, widget: markdown}

  # Gestione Menu (Style PrestaShop/WordPress)
  - name: "menus"
    label: "Gestione Menu"
    delete: false
    create: false
    files:
      - label: "Menu Italiano"
        name: "it"
        file: "data/menus/it.yml"
        fields:
          - label: "Menu Principale (Header)"
            name: "main"
            widget: "list"
            collapsed: true
            label_singular: "Voce"
            summary: "{{name}} → {{url}}"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - {label: "URL", name: "url", widget: "string", required: false}
              - {label: "Ordine", name: "weight", widget: "number", required: false}
              - label: "Sottomenu"
                name: "submenu"
                widget: "list"
                required: false
                collapsed: true
                label_singular: "Voce"
                summary: "{{name}} → {{url}}"
                fields:
                  - {label: "Nome", name: "name", widget: "string"}
                  - {label: "URL", name: "url", widget: "string", required: false}
                  - {label: "Ordine", name: "weight", widget: "number", required: false}
          - label: "Footer Colonna 1"
            name: "footer_column_1"
            widget: "list"
            collapsed: true
            label_singular: "Voce"
            summary: "{{name}} → {{url}}"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - {label: "URL", name: "url", widget: "string", required: false}
              - {label: "Ordine", name: "weight", widget: "number", required: false}
          - label: "Footer Colonna 2"
            name: "footer_column_2"
            widget: "list"
            collapsed: true
            label_singular: "Voce"
            summary: "{{name}} → {{url}}"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - {label: "URL", name: "url", widget: "string", required: false}
              - {label: "Ordine", name: "weight", widget: "number", required: false}
          - label: "Footer Colonna 3"
            name: "footer_column_3"
            widget: "list"
            collapsed: true
            label_singular: "Voce"
            summary: "{{name}} → {{url}}"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - {label: "URL", name: "url", widget: "string", required: false}
              - {label: "Ordine", name: "weight", widget: "number", required: false}
      - label: "Menu Inglese"
        name: "en"
        file: "data/menus/en.yml"
        fields:
          - label: "Main Menu (Header)"
            name: "main"
            widget: "list"
            collapsed: true
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "URL", name: "url", widget: "string", required: false}
              - {label: "Weight", name: "weight", widget: "number", required: false}
              - label: "Submenu"
                name: "submenu"
                widget: "list"
                required: false
                collapsed: true
                fields:
                  - {label: "Name", name: "name", widget: "string"}
                  - {label: "URL", name: "url", widget: "string", required: false}
                  - {label: "Weight", name: "weight", widget: "number", required: false}
          - label: "Footer Column 1"
            name: "footer_column_1"
            widget: "list"
            collapsed: true
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "URL", name: "url", widget: "string", required: false}
              - {label: "Weight", name: "weight", widget: "number", required: false}
          - label: "Footer Column 2"
            name: "footer_column_2"
            widget: "list"
            collapsed: true
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "URL", name: "url", widget: "string", required: false}
              - {label: "Weight", name: "weight", widget: "number", required: false}
          - label: "Footer Column 3"
            name: "footer_column_3"
            widget: "list"
            collapsed: true
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "URL", name: "url", widget: "string", required: false}
              - {label: "Weight", name: "weight", widget: "number", required: false}
