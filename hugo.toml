baseURL = "https://papermod-1rp.pages.dev/"
buildFuture = true
title = "Saasify"

# --- CONFIGURAZIONE LINGUA PRINCIPALE ---
# L'italiano è la lingua di default. I file sono in content/it/
defaultContentLanguage = "it"

# Theme Config
theme = "hugo-saasify-theme"

# Enable emoji support
enableEmoji = true

# Enable Git info for lastmod
enableGitInfo = true

# --- TASSONOMIE (Categorie e Tag) ---
[taxonomies]
  category = 'categories'
  tag = 'tags'

# Pagination
[pagination]
  pagerSize = 6
  path = "page"

# --- GESTIONE MULTILINGUA ---
# Per aggiungere una lingua: 1. Aggiungi il blocco [languages.xx] qui sotto. 2. Crea la cartella content/xx/
[languages]
  [languages.it]
    languageCode = "it-it"
    languageName = "Italiano"
    title = "Saasify IT"
    weight = 1
    contentDir = "content"
    [languages.it.params.header.buttons.signIn]
      text = "Accedi"
      url = "/signin"
    [languages.it.params.header.buttons.getStarted]
      text = "Inizia ora"
      url = "/get-started"
    [languages.it.params.cta]
      title = "Pronto a costruire il tuo sito SaaS?"
      description = "Unisciti alle aziende che già usano il nostro tema per creare siti web bellissimi e performanti."
      [languages.it.params.cta.primary_button]
        text = "Inizia ora"
      [languages.it.params.cta.secondary_button]
        text = "Prenota una Demo"
    [languages.it.params.footer]
      column_1_title = "Funzionalità"
      column_2_title = "AZIENDA"
      column_3_title = "LEGALE"
    [languages.it.params.blog]
      title = "Ultimi Articoli"
      subtitle = "Scopri di più sullo sviluppo web e le migliori pratiche"
      [languages.it.params.blog.sidebar.recent]
        title = "Articoli Recenti"
      [languages.it.params.blog.sidebar.categories]
        title = "Categorie"
      [languages.it.params.blog.sidebar.tags]
        title = "Tag Popolari"
      [languages.it.params.blog.sidebar.subscribe]
        title = "Iscriviti alla Newsletter"
        description = "Ricevi gli ultimi post direttamente nella tua casella di posta"
        buttonText = "Iscriviti"
        placeholder = "Inserisci la tua email"
        disclaimer = "Rispettiamo la tua privacy. Disiscriviti in qualsiasi momento."

  [languages.en]
    languageCode = "en-us"
    languageName = "English"
    title = "Saasify EN"
    weight = 2
    contentDir = "content"
    [languages.en.params.header.buttons.signIn]
      text = "Sign in"
      url = "/signin"
    [languages.en.params.header.buttons.getStarted]
      text = "Get Started"
      url = "/get-started"
    [languages.en.params.cta]
      title = "Ready to Build Your SaaS Website?"
      description = "Join companies already using our theme to create beautiful, high-performance websites."
      [languages.en.params.cta.primary_button]
        text = "Get Started Free"
      [languages.en.params.cta.secondary_button]
        text = "Book Demo"
    [languages.en.params.footer]
      column_1_title = "Features"
      column_2_title = "COMPANY"
      column_3_title = "LEGAL"
    [languages.en.params.blog]
      title = "Latest Articles"
      subtitle = "Learn more about web development and best practices"
      [languages.en.params.blog.sidebar.recent]
        title = "Recent Articles"
      [languages.en.params.blog.sidebar.categories]
        title = "Categories"
      [languages.en.params.blog.sidebar.tags]
        title = "Popular Tags"
      [languages.en.params.blog.sidebar.subscribe]
        title = "Subscribe to Newsletter"
        description = "Get the latest posts delivered right to your inbox"
        buttonText = "Subscribe"
        placeholder = "Enter your email"
        disclaimer = "We respect your privacy. Unsubscribe at any time."

# --- PARAMETRI GLOBALI DEL SITO ---
[params]
  description = ""
  author = "Chaoming Li"
  logo = "/images/logo.svg"
  
  # Global CTA Configuration
  [params.cta]
    enable = true
    gradient_from = "#2563eb"  # Indigo-600
    gradient_to = "#7c3aed"    # Purple-600
    gradient_angle = 30
    [params.cta.primary_button]
      url = "/get-started"
    [params.cta.secondary_button]
      url = "/demo"
  
  # Social Media Links
  [params.social]
    linkedin = "https://linkedin.com/in/chaomingli"
    twitter = "https://twitter.com/lichaoming"
    bluesky = "https://bsky.app/profile/bsky.app"
    youtube = "https://youtube.com/@chaomingli"
    facebook = "https://facebook.com/lichaoming"
    instagram = "https://instagram.com/lichaoming"
    github = "https://github.com/chaoming"
    telegram = "https://t.me/yourchannel"
    discord = "https://discord.gg/yourinvite"
    slack = "https://yourteam.slack.com"
    medium = "https://medium.com/@yourhandle"
    dribbble = "https://dribbble.com/yourprofile"
    behance = "https://behance.net/yourprofile"
  
  # Footer Configuration
  [params.footer]
  
  [params.header]
    # Header background and border styles (optional)
    background = "bg-white/80 backdrop-blur-sm"
    border = "border-b border-gray-100"
    
    # Logo configuration
    [params.header.logo]
      src = "/images/logo.svg"
    
    # Menu configuration
    [params.header.menu]
      spacing = "space-x-8"
      
      # Dropdown menu configuration
      [params.header.menu.dropdown]
        width = "w-72"
        container_padding = "py-6"
        item_padding = "px-8 py-3"
        background = "bg-white"
        border = "border border-gray-100"
        shadow = "shadow-xl"
        radius = "rounded-lg"
        text_color = "text-gray-700"
        hover_background = "hover:bg-gray-50"
        text_size = "text-sm"
    
    # Button configuration
    [params.header.buttons]
      # Sign In button
      [params.header.buttons.signIn]
        url = "/signin"
      
      # Get Started button
      [params.header.buttons.getStarted]
        url = "/get-started"

  # Blog configuration
  [params.blog]
    enable = true
    
    # Blog CTA configuration
    [params.blog.cta]
      enable = true  # Enable/disable CTA in blog posts
    
    # Sidebar configuration
    [params.blog.sidebar]
      # Recent articles section
      [params.blog.sidebar.recent]
        enable = true
        count = 5
      
      # Categories section
      [params.blog.sidebar.categories]
        enable = true
      
      # Tags section
      [params.blog.sidebar.tags]
        enable = true
        count = 20

      # Subscribe form section
      [params.blog.sidebar.subscribe]
        enable = true
        action = "https://formspree.io/f/your-form-id"
        emailName = "email"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.80.0"

[build]
  writeStats = true

[build.buildStats]
  enable = true

[security.funcs]
  getenv = ['^HUGO_', '^CI$']

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    codeFences = true
    guessSyntax = true
    lineNumbersInTable = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

# --- FINE CONFIGURAZIONE ---
